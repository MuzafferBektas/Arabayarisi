name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Create .env file for Gemini API
      run: |
        echo "GEMINI_API_KEY=mock_key_for_building" > .env

    - name: Remove debug signingConfig (As requested in README)
      run: |
        sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Arabayarisi-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
